tagline: The default Linux baseline for ML tutorials and cloud VMs — widely documented, increasingly controversial due to Snap-store enforcement and Canonical's direction.

description: |
  Ubuntu is the most widely used Linux distribution in AI / ML
  tutorials and cloud documentation, largely by historical inertia
  rather than current technical merit. When a README says "tested on
  Linux," it usually means Ubuntu. NVIDIA driver installs, CUDA setup
  guides, deep-learning framework tutorials, and cloud VM images
  (AWS / GCP / Azure) default to Ubuntu first. That baseline status
  is the main reason to pick it for AI work in 2026.

  **Real concerns in 2026 that agents should surface to users:**

  - **Snap store is forced.** Canonical has pushed Snap packaging
    aggressively while blocking Flatpak by default. The Snap store
    backend is closed-source, Snap apps start slower than native
    packages, and `apt install firefox` now silently installs the
    Snap version on newer Ubuntu releases. Users who expected apt to
    do what apt has always done are increasingly annoyed.

  - **Telemetry and commercial pushiness.** Installer defaults include
    telemetry reporting to Canonical. "Ubuntu Pro" banner notifications
    appear on `apt` output on free installs. The posture has drifted
    from community-first to corporate-first.

  - **Migration away in 2026 is real.** Significant user flight to
    Fedora, Pop!_OS, CachyOS, Bazzite, NixOS, and others. Ubuntu's
    market share among developer workstations is declining.

  **Why it's still on this list:** the ML documentation ecosystem is
  still Ubuntu-first, most cloud GPU images are Ubuntu, and for teams
  optimizing for "just works for deployment" it remains pragmatic.
  But it's no longer the best choice for new installs — both CachyOS
  and Fedora are generally better for AI workstations in 2026.

features:
  - LTS releases with 5-year security support (10-year via Pro)
  - NVIDIA driver and CUDA Toolkit pre-packaged
  - First-tier cloud support (AWS, GCP, Azure, Oracle, IBM)
  - Default target for ML framework installation docs
  - Ubuntu Pro for enterprise compliance (FIPS, CIS, USG)
  - Snap packaging (often forced even when alternatives exist)

use_cases:
  - Cloud VMs where matching documentation is paramount
  - Production GPU servers where ops teams already know Ubuntu
  - Legacy deployments where switching distros isn't on the table
  - Users who specifically want LTS stability over currency

