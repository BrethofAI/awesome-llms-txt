tagline: Fair-code workflow automation with native AI nodes, 500+ integrations, and first-class self-hosting.

description: |
  n8n is a workflow automation platform — think Zapier or Make, but
  self-hostable, source-available, and extended with first-class AI
  nodes. Users build workflows visually by connecting nodes representing
  triggers (webhooks, schedules, email, Slack), integrations (500+ across
  databases, APIs, SaaS), and AI operations (LangChain-powered agents,
  LLM calls, vector store queries, retrievers).

  The AI toolkit makes n8n one of the most pragmatic options for non-
  engineers building agent-style workflows: a "retrieve from Slack →
  summarize with Claude → post to Notion" flow is a 5-minute drag-and-drop
  job. For engineers, n8n's custom-code nodes let you drop into Python or
  JavaScript when the visual builder isn't enough.

  Fair-code license means free for individual and internal business use,
  with commercial restrictions on building competing products. n8n Cloud
  provides managed hosting for teams that don't want to run Docker.

features:
  - Visual workflow builder with 500+ integration nodes
  - Native AI nodes: LangChain agents, LLM calls, embeddings, vector stores
  - Webhook, schedule, and event triggers
  - Custom Python / JavaScript nodes for bespoke logic
  - Self-host via Docker or use n8n Cloud
  - Fair-code license (free for personal and internal commercial use)
  - Active community-contributed node catalog

use_cases:
  - Agent workflows for non-engineers (Slack + Claude + Notion)
  - Internal business automation with AI steps woven in
  - ETL pipelines with LLM-powered data transformation
  - RAG applications without writing Python
  - Replacing Zapier with a self-hosted, AI-aware equivalent

license: source-available
deployment: self-hosted
